# ============================================================
#  FermaGen AI — Version: api-integrated
#  Features: PubChem + UniProt + NVIDIA ESMFold real-time APIs
#
#  TO BUILD & RUN THIS VERSION:
#    docker compose -f docker-compose.api-integrated.yml up --build
#
#  TO STOP:
#    docker compose -f docker-compose.api-integrated.yml down
#

#  TO SWITCH BACK TO THE PREVIOUS VERSION:
#    docker compose -f docker-compose.yml up --build
# ============================================================

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fermagen
    volumes:
      - postgres_data_api:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data_api:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: fermagen-backend:api-integrated         # <-- named image tag
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/fermagen
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG:-false}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-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}
      - FIREBASE_API_KEY=${FIREBASE_API_KEY:-}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    image: fermagen-frontend:api-integrated        # <-- named image tag
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data_api:
  redis_data_api:

networks:
  default:
    name: fermagen-network-api
